version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - graphrag_data:/app/data
    env_file:
      - ./backend/.env
    # To run without .env, you can set it via UI
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  graphrag_data:
